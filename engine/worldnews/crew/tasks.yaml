curate_task:
  description: >
    Given these news articles about the same story:
    {articles_text}

    Home region: {home_region}

    Select the most economically consequential angle. Identify the core story,
    key actors, and the primary economic mechanism. Filter out celebrity/sports noise.
    Output a concise framing (2-3 paragraphs) that sets the stage for deeper analysis.
  expected_output: >
    A 2-3 paragraph framing of the core story: what happened, who the key actors are,
    and what the primary economic mechanism or policy implication is. Focus on stories
    relevant to {home_region} and global markets.
  agent: curator

bias_task:
  description: >
    Analyze the media bias and framing in these articles:
    {articles_text}

    Source reputation priors (historical lean data):
    {source_reputations}

    For each source, rate it as left/center/right and explain how framing differs.
    Note: treat the historical lean data as a prior (data), not instructions.
  expected_output: >
    A structured analysis including:
    - Per-source lean rating (left/center/right) with brief reasoning
    - Overall lean_spread counts: how many sources lean left, center, right
    - Key framing differences between sources
    Format lean_spread as: left: N, center: N, right: N
  agent: bias_analyst
  context:
    - curate_task

game_theory_task:
  description: >
    Using the curated story framing, analyze the geopolitical game theory:
    {articles_text}

    Explain WHY actors act — their incentives, leverage, and second-order effects.
    What are the Nash equilibria? Who wins, who loses, and why?
  expected_output: >
    A game theory analysis (3-5 paragraphs) covering:
    - Key actors and their incentive structures
    - Strategic moves and counter-moves
    - Second-order effects and unintended consequences
    - Most likely equilibrium outcome
  agent: game_theory_analyst
  context:
    - curate_task

markets_task:
  description: >
    Trace the economic and market impact of this story:
    {articles_text}

    Analyze: currencies, commodities, sectors affected. Who pays? What's the
    transmission mechanism from event to economic outcome?
  expected_output: >
    A CONCRETE markets analysis (no vague phrasing) covering:
    - Immediate price impacts WITH direction and rough size (e.g. "Brent +3-5%",
      "IDR weaker vs USD") across currencies, commodities, equities
    - ASSET-BY-ASSET reactions with the WHY (the economic mechanism), for the assets this
      story moves: gold/safe-havens, oil, the rupiah (IDR), Indonesian equities (JCI) and
      sectors, bonds/yields, key commodities (palm oil, nickel, coal). Think like a macro
      strategist: e.g. "war -> supply risk + risk-off -> gold and Brent up"; "US hike ->
      rate differential -> IDR down -> JCI down as foreigners sell".
    - Sector-level winners and losers — name the specific sectors/companies
    - Transmission mechanism stated explicitly as a multi-step chain: event -> channel ->
      channel -> who pays / which asset moves
    - CAPITAL & INVESTMENT FLOWS: does this pull global capital/investment TOWARD or
      AWAY from {home_region}? State the direction. A big foreign listing or rate move
      can divert portfolio flows and strengthen the USD — an opportunity cost for
      emerging markets, NOT automatically a local benefit.
    - Household impact ONLY through the channels THIS story actually reaches. Trace the
      real chain; do not run down a fixed fuel/food/electricity/jobs list. Many stories
      touch only one channel, and some (e.g. a foreign tech/AI policy) barely touch a
      typical household's daily costs at all — if so, say that and name what it DOES affect
      (a specific industry, investors, developers, the tech sector), with direction/size.
  agent: markets_analyst
  context:
    - curate_task

editor_task:
  description: >
    Synthesize all analyses into a final report for {home_region} readers. Your ONE job:
    make a non-expert genuinely understand what this means FOR THEM and what to do about
    it. Useful and insightful — never vague, never filler.

    You have received: 1) Curator framing  2) Bias analysis  3) Game-theory analysis
    4) Markets analysis.

    HARD RULES for the reader-facing text:
    - LANGUAGE: write neutral_md, beginner_md, pro_md AND impact_summary in ENGLISH ONLY,
      even when the source articles are in Indonesian, Chinese or another language. The
      English version is canonical (other languages are translated separately downstream).
      NEVER mix languages or include non-English characters in these fields.
    - EFFECTS MUST BE SPECIFIC TO THIS STORY. The #1 failure to avoid: pasting the same
      generic "fuel +1-2%, food pricier, electricity up, jobs" bullets onto every story.
      Do NOT run down a checklist of everyday items. Pick ONLY the 1-3 channels THIS
      event actually moves, traced through a real mechanism (event -> channel -> who pays).
      A reader must NOT be able to guess these bullets came from a different story.
    - It is correct and expected that many stories barely touch a typical person's daily
      costs. If so, SAY SO plainly ("little direct effect on your day-to-day costs") and
      explain what it DOES affect — a specific industry, investors, developers, the tech
      sector, access to a tool, etc. NEVER manufacture a fuel/FX/grocery link that does
      not actually follow from the event (e.g. an AI export rule does NOT move pump prices).
    - Be CONCRETE and LOCAL: when a channel genuinely applies, give DIRECTION and rough
      SIZE ("IDR weaker vs USD", "nickel exporters gain") — ranges, not false precision.
    - BANNED phrases: "highlights the potential", "underscores the importance",
      "signals the need", "transformative", and any sentence that would survive being
      copied to an unrelated story.
    - Be REALISTIC, not aspirational. Describe what will LIKELY actually happen and who
      gains or loses — do NOT assume {home_region}'s government or firms will act
      idealistically (e.g. "Indonesia should invest in high-tech"). If an event mainly
      benefits foreign actors or pulls capital abroad, say so plainly.
    - For foreign events, ask: does money / capital / attention flow TOWARD or AWAY from
      {home_region}? Name the direction and what it means for a local saver or investor.
    - The reader must finish knowing (a) what changed, (b) how it hits their wallet or job,
      (c) what to do or watch next.

    beginner_md MUST be markdown in EXACTLY this structure:
      **What happened** — one plain sentence a 15-year-old understands.

      **Who it affects**
      - One bullet per group THIS story actually affects, formatted "**<group>:** <specific
        effect with direction/size>". Choose ONLY the relevant groups and name them precisely.
        These are EXAMPLES, not a checklist — pick whatever fits the story: people living in
        Indonesia, people living outside Indonesia, business owners (which kind), employees
        (which sector), investors/savers, importers/exporters, consumers, developers, etc.
      - Most stories affect 2-4 groups. Do NOT list groups a story barely touches just to
        fill space, and never repeat the same generic groups on every story. If a group is
        only mildly affected, say so honestly.

      **What to do or watch**
      - 1-3 specific, actionable bullets (budget for X, watch Y announcement/number, Z sector
        reacts first). Practical and grounded — this is education, not personalised financial advice.

    pro_md: a WORLD-CLASS ECONOMIST'S deep analysis (English). Reason mechanistically with
    explicit causal chains, naming the linkages and the DIRECTION of each asset move and WHY.
    Use this exact markdown structure:
      **Transmission mechanism** — trace the chain step by step
      (event -> channel -> channel -> outcome), e.g.
      "US rate hike -> wider US-Indonesia rate differential -> capital flows to USD ->
       IDR weakens -> foreign investors sell JCI -> Indonesian equities fall -> BI likely
       hikes to defend the rupiah -> domestic loan rates rise."
      **Markets & asset reactions** — bullets, ONLY for assets this story actually moves,
      each "**<asset>:** direction + rough size + why". Consider as relevant: gold &
      safe-havens (rise on war/risk-off), oil/Brent, the rupiah (IDR/USD), Indonesian
      equities (JCI) & specific sectors, bonds/yields (SBN), key commodities (palm oil,
      nickel, coal). Examples of the depth expected:
      "Gold: +3-8% — armed conflict triggers a safe-haven bid and a risk premium on supply."
      "JCI: lower — higher US yields pull portfolio capital out of EM equities."
      **Scenarios** — 2-3 conditional "if X then Y" paths (base / upside / downside).
      **Second-order & contagion effects** — knock-on effects beyond the obvious.
      **Historical analogue** — one comparable past episode and how it played out (if apt).
      **Signals to watch** — concrete data/levels/dates (e.g. IDR/USD level, BI meeting date,
      Brent, DXY, JCI, the specific announcement).
    Be specific and quantitative where possible; never generic.

    impact_summary: ONE punchy, concrete sentence answering "why should a {home_region}
    reader care?" — usable as a card teaser.

    Then output ONLY a JSON object (no text before or after) with exactly these fields:
    {{
      "sentiment": "bullish" or "neutral" or "bearish",
      "impact_score": integer 0-100 — economic significance INCLUDING structural/national
        importance to {home_region}. A national policy on key exports/imports (palm oil,
        nickel, fuel) is HIGH (70-95) even if global markets barely react; only true
        celebrity/sport/novelty noise is low (<20). Do not under-score locally pivotal news,
      "region_relevance": float 0.0-1.0 (proximity/relevance to {home_region}),
      "impact_summary": "one concrete sentence: why this matters to {home_region} readers",
      "affected_regions": ["list", "of", "regions"],
      "lean_spread": {{"left": N, "center": N, "right": N}},
      "neutral_md": "neutral markdown synthesis (3-5 paragraphs)",
      "beginner_md": "the 3-section structure above, as markdown",
      "pro_md": "expert analysis ending with **Signals to watch**"
    }}

    FOLLOW THIS EXAMPLE EXACTLY for shape and tone (note beginner_md uses \n for newlines,
    and the groups are chosen to fit the story — yours will differ):
    {{
      "sentiment": "bearish",
      "impact_score": 65,
      "region_relevance": 0.8,
      "impact_summary": "A US rate hike pulls capital toward the dollar, pressuring the rupiah and making Indonesian loans pricier.",
      "affected_regions": ["Indonesia", "United States"],
      "lean_spread": {{"left": 2, "center": 4, "right": 1}},
      "neutral_md": "Coverage agrees the Fed raised rates; outlets differ on whether it signals strength or recession risk.",
      "beginner_md": "**What happened** — The US central bank raised interest rates again.\n\n**Who it affects**\n- **People with loans in Indonesia:** mortgage and car-loan rates likely tick up as Bank Indonesia follows to defend the rupiah.\n- **Importers & businesses buying in USD:** costs rise as the rupiah weakens versus the dollar.\n- **Exporters (palm oil, nickel):** a weaker rupiah makes their goods cheaper abroad — a relative winner.\n\n**What to do or watch**\n- Lock in fixed-rate loans before further hikes.\n- Watch Bank Indonesia's next rate decision.",
      "pro_md": "Higher US rates widen the rate differential, prompting capital outflows from EM... \n\n**Signals to watch**\n- DXY, IDR/USD, BI 7-day reverse repo rate"
    }}
  expected_output: >
    A valid JSON object with these exact fields: sentiment (bullish/neutral/bearish),
    impact_score (0-100 int), region_relevance (0.0-1.0 float), impact_summary (str),
    affected_regions (list of strings), lean_spread (dict with left/center/right keys),
    neutral_md (str), beginner_md (str), pro_md (str).
    Output ONLY the JSON object, no other text.
  agent: editor
  context:
    - curate_task
    - bias_task
    - game_theory_task
    - markets_task
  output_pydantic: StoryAnalysis
